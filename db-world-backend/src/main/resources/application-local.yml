# ===========================
# Common Application Properties
# ===========================
app:
  name: db-world
  version: @project.version@
  base-path: D:/home/dbworld_admin/ext_hdisk/dbworld
  data-path: D:/home/dbworld_admin/ext_hdisk/dbworld
  stream-path: D:/Bhavya/Videos

  paths:
    logs: ${app.base-path}/logs/
    main-log: ${app.paths.logs}/dbworld.json
    download-log: ${app.paths.logs}/logs/downloads.log
    config: ${app.base-path}/config
    temp: ${app.data-path}/temp
    downloads: ${app.data-path}/downloads
    integration: D:/Bhavya/ProcessedVideos/
    torrents: ${app.videos-path}/Torrent Download
    archived-logs: ${app.paths.logs}/archived
    external-videos: /home/dbworld_admin/ext_hdisk_1/videos

  tools:
    yt-dlp: yt-dlp
    mediainfo: D:\Bhavya\Downloads\Compressed\MediaInfo_CLI_24.12_Windows_x64\mediainfo
    hs-cookies: ${app.paths.config}/HS_COOKIES.txt

  api-keys:
    tmdb: ${TMDB_API_KEY}

  tokens:
    tmdb: ${TMDB_ACCESS_TOKEN}

  static:
    cache:
      max-age: 31536000  # 1 year for versioned assets
      public-resources: true
    compression:
      enabled: true
    versioning:
      enabled: true
    security:
      headers:
        enabled: true
    monitoring:
      enabled: true

# CORS configuration for static resources
cors:
  allowed-origins: "https://dn-world.in"
  allowed-methods: "GET,HEAD"
  allowed-headers: "*"
  allow-credentials: false
  max-age: 3600

# ===========================
# Server Configuration
# ===========================
server:
  port: ${SERVER_PORT:9090}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,text/css,application/javascript,application/json,application/xml
  servlet:
    context-path: /
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      location: ${app.paths.temp}
  tomcat:
    connection-timeout: 5000ms
    max-connections: 8192
    accept-count: 100
    threads:
      max: 200
      min-spare: 10
    accesslog:
      enabled: true
      directory: ${app.paths.logs}
      pattern: common
      rotate: true

# ===========================
# Spring Application Configuration
# ===========================
spring:
  application:
    name: ${app.name}

  # ---------------------------
  # Database Configuration
  # ---------------------------
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USER:dbworld_admin}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${app.name}_pool
      minimum-idle: ${DB_POOL_MIN:5}
      maximum-pool-size: ${DB_POOL_MAX:20}
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  # ---------------------------
  # JPA/Hibernate Configuration
  # ---------------------------
  jpa:
    show-sql: false
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        transaction:
          coordinator_class: jdbc
        cache:
          use_second_level_cache: false
          use_query_cache: false
    naming:
      physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  # ---------------------------
  # Redis Configuration
  # ---------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 2000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000
      cache-null-values: false
      enable-statistics: true

  # ---------------------------
  # Web Configuration
  # ---------------------------
  web:
    resources:
      cache:
        period: 31536000  # seconds

  mvc:
    async:
      request-timeout: 30000
    converters:
      preferred-json-mapper: gson

  # ---------------------------
  # Async Configuration
  # ---------------------------
  task:
    execution:
      thread-name-prefix: ${app.name}-async-
      pool:
        core-size: ${ASYNC_CORE_SIZE:5}
        max-size: ${ASYNC_MAX_SIZE:10}
        queue-capacity: 100
        allow-core-thread-timeout: true
        keep-alive: 60s

  # ---------------------------
  # Actuator (Monitoring)
  # ---------------------------
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,env
        base-path: /manage
    endpoint:
      health:
        show-details: when_authorized
        probes:
          enabled: true
      metrics:
        enabled: true
    health:
      redis:
        enabled: true
      db:
        enabled: true

# ===========================
# Security Configuration
# ===========================
jwt:
  token:
    validity: 36000000
    access-token-ttl: 5m
    refresh-token-ttl: 30d
    secret: ${JWT_SECRET}
  key:
    public: ${JWT_PUBLIC_KEY}
    private: ${JWT_PRIVATE_KEY}

jasypt:
  encryptor:
    bean: jasyptStringEncryptor
    algorithm: PBEWithMD5AndDES
    password: ${JASYPT_PASSWORD}

# ===========================
# API Documentation
# ===========================
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /docs
    enabled: ${SWAGGER_ENABLED:false}
    tags-sorter: alpha
    operations-sorter: alpha

# ===========================
# External Services
# ===========================
aria2:
  rpc:
    url: ${ARIA2_RPC_URL:http://localhost:6800/jsonrpc}
    secret: ${ARIA2_SECRET}
  ws:
    url: ${ARIA2_WS_URL:ws://localhost:6800/jsonrpc}

