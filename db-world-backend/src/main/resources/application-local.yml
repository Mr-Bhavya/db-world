# Server Config
Server:
  port: 9000
  jetty:
    idle-timeout: 60000 # 60 seconds
  compression:  # Enable Gzip compression
    enabled: true
    min-response-size: 1024
    mime-types: application/octet-stream,text/plain,text/html,text/css,application/json,application/xml

spring:
  application:
    name: db-world
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 8526
    url: jdbc:mysql://localhost:3306/db_world?createDatabaseIfNotExist=true&jdbcCompliantTruncation=false
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
#      idle-timeout: 30000
#      connection-timeout: 30000
      pool-name: HikariPool-1
  jpa:
    show-sql: false
    generate-ddl: true
    open-in-view: true
    hibernate:
      ddl-auto: update
      enable_lazy_load_no_trans: true
      dialect: org.hibernate.dialect.MySQLDialect
      event:
        merge:
          entity_copy_observer: allow
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  mvc:
    async:
      request-timeout: -1
    converters:
      preferred-json-mapper: gson
  gson:
    enable-complex-map-key-serialization: true
  servlet:
    multipart:
      enabled: true
  cache:
    type: redis
    host: localhost
    port: 6379
  devtools:   #live server
    livereload:
      enable: false
      port: 35720
  task:  # Enable async processing
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 50

#Swagger
springdoc:
  api-docs:
    path: /api/dbworld-api-doc
  swagger-ui:
#    operationsSorter: method
    path: /dbworld-api-doc.html

