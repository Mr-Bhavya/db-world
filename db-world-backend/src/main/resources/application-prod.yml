# Server Config
Server:
  port: 9090
  jetty:
    idle-timeout: 60000 # 60 seconds

#MongoDB
spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: db_world
      auto-index-creation: true
  jpa:
    show-sql: true
  devtools:
    livereload:
      enable: false
  mvc:
    converters:
      preferred-json-mapper: gson
  gson:
    enable-complex-map-key-serialization: true
  servlet:
    multipart:
      enabled: true

#Swagger
springdoc:
  api-docs:
    path: /api/dbworld-api-doc
  swagger-ui:
    path: /dbworld-api-doc.html

#Security
jwt:
  token:
    validity: 36000000  # validity in milisec 10*60*60*1000 ~ 10hour
