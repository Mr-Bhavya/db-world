spring:
  config:
    activate:
      on-profile: prod

  # Lazy-init every bean — they're created on first use rather than at boot.
  # @Scheduled / @EventListener processors still register eagerly via bean
  # post-processors so background work isn't broken. Local-only because the
  # first request after boot pays the bean-creation cost; in prod we keep
  # everything eager so health checks see a fully-warm context.
  main:
    lazy-initialization
    : false

# ===========================
# Common Application Properties
# ===========================
app:
  name: db-world
  version: 3.0.0
  base-path: /app/db_world
  data-path: /srv/dbworld
  stream-path: /srv/dbworld/streams
  symlink-path: /srv/dbworld/symlinks


  paths:
    logs: ${app.base-path}/logs
    main-log: ${app.paths.logs}/${app.name}-info.json
    download-log: ${app.paths.logs}/nginx/download_tracker.log
    config: ${app.base-path}/config
    temp: ${app.data-path}/temp
    downloads: ${app.data-path}/downloads
    integration: ${app.data-path}/integration
    torrents: ${app.stream-path}/Torrent Download
    archived-logs: ${app.paths.logs}/archived
    external-videos: /home/dbworld_admin/ext_hdisk_1/videos

  cdn:
    base-url: https://cdn.db-world.in

  tools:
    yt-dlp: yt-dlp
    ffmpeg: ffmpeg
    seven-zip: 7z
    mediainfo: mediainfo
    hs-cookies: ${app.paths.config}/HS_COOKIES.txt
    cookies-dir: /etc/dbworld/cookies

server:
  port: ${SERVER_PORT:9090}

cors:
  allowed-origins: https://db-world.in

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    com.db.dbworld: INFO