# Server Config
Server:
  port: 9090
  jetty:
    idle-timeout: 60000 # 60 seconds
  compression:  # Enable Gzip compression
    enabled: true
    min-response-size: 1024
    mime-types: application/octet-stream,text/plain,text/html,text/css,application/json,application/xml

#MySQL Database
spring:
  application:
    name: db-world
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: dbworld_admin
    password: BD@pi
    url: jdbc:mysql://localhost:3306/db_world?createDatabaseIfNotExist=true&jdbcCompliantTruncation=false
  jpa:
    show-sql: false
    generate-ddl: true
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
      enable_lazy_load_no_trans: true
      event:
        merge:
          entity_copy_observer: allow
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  devtools:
    livereload:
      enable: false
  mvc:
    converters:
      preferred-json-mapper: gson
  gson:
    enable-complex-map-key-serialization: true
  servlet:
    multipart:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  task:  # Enable async processing
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 50

#Security
