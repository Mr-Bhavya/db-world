# Server Config
Server:
  port: 9090
  jetty:
    idle-timeout: 60000 # 60 seconds
  compression:  # Enable Gzip compression
    enabled: true
    min-response-size: 1024
    mime-types: application/octet-stream,text/plain,text/html,text/css,application/json,application/xml


spring:
  application:
    name: db-world

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/new_db_world?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: dbworld_admin
    password: BD@pi
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: DBWorldPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # JPA/Hibernate Configuration
  jpa:
    show-sql: false
    generate-ddl: true
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        # Removed explicit dialect (let Hibernate auto-detect)
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true
        transaction:
          coordinator_class: jdbc # Explicitly specify non-JTA transactions
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Redis Configuration
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      host: localhost
      port: 6379
      time-to-live: 60000  # 1 minute cache expiration

  # Web Configuration
  mvc:
    async:
      request-timeout: -1
    converters:
      preferred-json-mapper: gson
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # GSON Configuration
  gson:
    enable-complex-map-key-serialization: true

  # DevTools Configuration
  devtools:
    livereload:
      enabled: false
      port: 35720

  # Async Task Execution
  task:
    execution:
      pool:
        core-size: 10
        max-size: 20
        queue-capacity: 50

