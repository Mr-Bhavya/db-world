# =========================================================
# MAP BLOCKS
# =========================================================

# HTTP status → CDN event type for structured logging
map $status $event_type {
    206     "PARTIAL";
    200     "COMPLETE";
    default "REQUEST";
}

# arg_type → Content-Disposition value
map $arg_type $content_disposition_value {
    "DOWNLOAD" "attachment";
    default    "inline";
}


# =========================================================
# LOG FORMATS
# =========================================================

log_format api_json escape=json '{
  "time":"$time_iso8601",
  "remote_addr":"$remote_addr",
  "real_ip":"$http_x_forwarded_for",
  "method":"$request_method",
  "uri":"$request_uri",
  "status":$status,
  "bytes_sent":$body_bytes_sent,
  "request_length":$request_length,
  "request_time":"$request_time",
  "upstream_time":"$upstream_response_time",
  "upstream_status":"$upstream_status",
  "scheme":"$scheme",
  "host":"$host",
  "server":"$server_name",
  "protocol":"$server_protocol",
  "connection":"$connection",
  "connection_requests":"$connection_requests",
  "user_agent":"$http_user_agent",
  "referer":"$http_referer",
  "auth":"$http_authorization"
}';

log_format cdn_json escape=json '{
  "time":"$time_iso8601",
  "remote_addr":"$remote_addr",
  "real_ip":"$http_x_forwarded_for",
  "method":"$request_method",
  "request":"$request_uri",
  "status":$status,
  "bytes_sent":$body_bytes_sent,
  "content_range":"$sent_http_content_range",
  "range_header":"$http_range",
  "file":"$arg_originalFile",
  "file_id":"$uri",
  "user":"$arg_userId",
  "download_id":"$arg_downloadId",
  "request_id":"$arg_requestId",
  "type":"$arg_type",
  "event":"$event_type",
  "duration_sec":"$request_time",
  "upstream_time":"$upstream_response_time",
  "connection":"$connection",
  "connection_requests":"$connection_requests",
  "user_agent":"$http_user_agent",
  "referer":"$http_referer",
  "server":"$server_name"
}';

# Global access log
access_log /app/db_world/logs/nginx/access.log;


# =========================================================
# UPSTREAM
# =========================================================

upstream spring_boot {
    server 127.0.0.1:9090;
    keepalive 64;
}


# =========================================================
# DEFAULT SERVER (block unknown hosts)
# =========================================================

server {
    listen 80 default_server;
    server_name _;
    return 403;
}


# =========================================================
# MAIN APPLICATION SERVER — db-world.in
# =========================================================

server {
    listen 80;
    server_name db-world.in;

    root /var/www/dbworld;
    index index.html;

    client_max_body_size 5G;

    # ─────────────────────────────────────────────
    # API + SPA
    # ─────────────────────────────────────────────
    location / {
        proxy_pass http://spring_boot;
        proxy_http_version 1.1;

        access_log /app/db_world/logs/nginx/api_access.log api_json;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ─────────────────────────────────────────────
    # WebSocket
    # ─────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://spring_boot;
        proxy_http_version 1.1;

        access_log /app/db_world/logs/nginx/api_access.log api_json;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─────────────────────────────────────────────
    # LEGACY CDN — X-Accel-Redirect support (internal)
    # Spring Boot now redirects (302) to cdn.db-world.in
    # instead of using X-Accel-Redirect.  These locations
    # remain as a fallback during rolling deployments.
    # Remove after all clients have migrated.
    # ─────────────────────────────────────────────
    location /cdn/stream/id/ {
        internal;
        alias /ext_hdisk/video_symlink/;

        sendfile on;
        aio      threads;
        directio 4m;

        add_header Accept-Ranges bytes           always;
        add_header Cache-Control "private, no-store" always;

        access_log /app/db_world/logs/nginx/cdn_access.log cdn_json;
    }

    location /cdn/stream/path/ {
        internal;
        alias /ext_hdisk/videos/;

        sendfile on;
        aio      threads;
        directio 4m;

        add_header Accept-Ranges bytes           always;
        add_header Cache-Control "private, no-store" always;

        access_log /app/db_world/logs/nginx/cdn_access.log cdn_json;
    }

    # ─────────────────────────────────────────────
    # AriaNg UI
    # ─────────────────────────────────────────────
    location /ariang/ {
        alias /var/www/ariang/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Aria2 JSON-RPC
    # ─────────────────────────────────────────────
    location /jsonrpc {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            return 204;
        }

        proxy_pass http://127.0.0.1:6800/jsonrpc;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header Access-Control-Allow-Origin "*";
    }
}


# =========================================================
# CDN SERVER — cdn.db-world.in
#
# Serves media files directly to the browser/player.
# Spring Boot validates the JWT, generates a CDN URL with
# tracking query params, and returns an HTTP 302 redirect
# here.  No JWT check at this layer — tracking happens
# purely through nginx CDN access logs.
#
# Query params captured in cdn_json:
#   userId, downloadId, requestId, type (ONLINE|DOWNLOAD),
#   originalFile.  The actual Range header is logged as
#   range_header; bytes served are in bytes_sent /
#   content_range.
# =========================================================

server {
    listen 80;
    server_name cdn.db-world.in;

    access_log /app/db_world/logs/nginx/cdn_access.log cdn_json;

    # CORS — allow the main app origin to embed CDN URLs
    add_header Access-Control-Allow-Origin   "https://db-world.in" always;
    add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"   always;
    add_header Access-Control-Allow-Headers  "Range"                always;
    add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

    # CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ─────────────────────────────────────────────
    # ID-based access — record-linked files via symlink
    # URL: /id/{mediaFileId}?userId=...&type=ONLINE|DOWNLOAD
    #       &downloadId=...&requestId=...&originalFile=...
    # ─────────────────────────────────────────────
    location /id/ {
        alias /ext_hdisk/video_symlink/;
        try_files $uri =404;

        sendfile       on;
        aio            threads;
        directio       8m;
        output_buffers 2 1m;

        add_header Accept-Ranges        bytes                          always;
        add_header Cache-Control        "private, no-store"            always;
        add_header Content-Disposition  $content_disposition_value     always;
    }

    # ─────────────────────────────────────────────
    # Path-based access — unassigned files by relative path
    # URL: /path/{relPath}?userId=...&type=ONLINE|DOWNLOAD&...
    # ─────────────────────────────────────────────
    location /path/ {
        alias /ext_hdisk/videos/;
        try_files $uri =404;

        sendfile       on;
        aio            threads;
        directio       8m;
        output_buffers 2 1m;

        add_header Accept-Ranges        bytes                          always;
        add_header Cache-Control        "private, no-store"            always;
        add_header Content-Disposition  $content_disposition_value     always;
    }
}


# =========================================================
# ARIANG SUBDOMAIN — ariang.db-world.in
# =========================================================

server {
    listen 80;
    server_name ariang.db-world.in;

    root  /var/www/ariang;
    index index.html;

    access_log /app/db_world/logs/nginx/api_access.log api_json;

    location / {
        try_files $uri $uri/ =404;
    }

    location = / {
        try_files /index.html =404;
    }

    location /jsonrpc {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            return 204;
        }

        proxy_pass http://127.0.0.1:6800/jsonrpc;
        proxy_http_version 1.1;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header Access-Control-Allow-Origin "*";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires    30d;
        access_log off;
    }
}
