<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">

<head>
  <meta charset="utf-8" />

  <!-- Primary Meta -->
  <title>DB World – Stream, Download & Manage Media</title>
  <meta name="description"
        content="DB World is a modern platform to stream, download, and manage movies, TV shows, weather, password manager, and games." />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#020617" />
  <meta name="google" content="notranslate" />
  <meta name="google-adsense-account" content="ca-pub-8394425716692410">

  <!-- Favicon (CDN + fallback) -->
  <link rel="icon"
        href="https://cdn.db-world.in/assets/favicon.ico"
        onerror="this.href='https://cdn.jsdelivr.net/gh/Mr-Bhavya/db-world-static@v1.0.0/favicon.ico';" />

  <link rel="apple-touch-icon"
        href="https://cdn.db-world.in/assets/logo192.png"
        onerror="this.href='https://cdn.jsdelivr.net/gh/Mr-Bhavya/db-world-static@v1.0.0/logo192.png';" />

  <!-- Manifest (must be local for correct scope) -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Performance -->
  <link rel="preconnect" href="https://cdn.db-world.in" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <!-- Font Awesome (with integrity) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css"
        integrity="sha512-L7MWcK7FNPcwNqnLdZq86lTHYLdQqZaz5YcAgE+5cnGmlw8JT03QB2+oxL100UeB6RlzZLUxCGSS4/++mNZdxw=="
        crossorigin="anonymous" />

  <!-- Bootstrap CSS (optional) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI="
        crossorigin="anonymous"
        onerror="this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css';" />

  <!-- Ads -->
  <script async
          src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8394425716692410"
          crossorigin="anonymous"></script>

  <!-- Loader Styles -->
  <style>
    #app-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #020617;
      color: #fff;
      font-family: sans-serif;
    }

    #app-loader img {
      width: 80px;
      margin-bottom: 20px;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #1e293b;
      border-top: 4px solid #14b8a6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>

</head>

<body>
<noscript>You need to enable JavaScript to run this app.</noscript>

<!-- App Root -->
<div id="root">
  <!-- Loading UI -->
  <div id="app-loader">
    <img
            src="https://cdn.db-world.in/assets/logo192.png"
            onerror="this.src='https://cdn.jsdelivr.net/gh/Mr-Bhavya/db-world-static@v1.0.0/logo192.png';"
            alt="DB World" />
    <div class="loader-spinner"></div>
    <p>Loading DB World...</p>
  </div>
</div>

<div id="modal-root"></div>

<!-- Leaflet JS -->
<script defer
        src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM="
        crossorigin="anonymous"
        onerror="this.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js';">
</script>

<!-- Lottie -->
<script type="module" defer
        src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs">
</script>

<!-- Bootstrap JS (only if needed) -->
<script defer
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous">
</script>

</body>

</html>
