<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.png" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description"
    content="DB World is a modern media platform to stream, download and manage movies and TV shows — with a secure AES password manager, live weather and games built in." />
  <meta name="google-adsense-account" content="ca-pub-8394425716692410">
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8394425716692410"
    crossorigin="anonymous"></script>

  <title>DB World :)</title>
  <style>
    #app-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
    .db-logo-wrap { position: relative; width: 96px; height: 96px; border-radius: 50%; overflow: hidden; animation: db-enter 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
    .db-logo-wrap img { width: 100%; height: 100%; display: block; }
    .db-shimmer { position: absolute; inset: 0; background: linear-gradient(105deg, transparent 25%, rgba(255,255,255,.55) 50%, transparent 75%); transform: translateX(-130%) skewX(-15deg); animation: db-shimmer 0.75s cubic-bezier(0.4,0,0.2,1) 0.45s forwards; }
    @keyframes db-enter  { from { opacity:0; transform:scale(0.68); } to { opacity:1; transform:scale(1); } }
    @keyframes db-shimmer { from { transform:translateX(-130%) skewX(-15deg); } to { transform:translateX(280%) skewX(-15deg); } }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <div id="app-loader">
      <div class="db-logo-wrap">
        <img src="/favicon.png" alt="DB World" />
        <div class="db-shimmer"></div>
      </div>
    </div>
  </div>
  <div id="modal-root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
