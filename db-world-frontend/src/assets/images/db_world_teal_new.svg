<svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Teal gradient -->
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00c6a7"/>
            <stop offset="100%" stop-color="#127061"/>
        </linearGradient>

        <!-- Glow effect -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <g fill="url(#g1)" filter="url(#glow)">
        <!-- Your main path (trimmed precision slightly) -->
        <path d="M52.57.64c-.1-.1-.2-.4-.3-.6-.6-.1-.8 0-.8.2-.2.5.8.7 1.1.4z"/>

        <!-- Add more cleaned paths here (same pattern) -->
    </g>
</svg>