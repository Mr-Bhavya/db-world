name: CI

# Fast safety-net checks on GitHub-hosted runners (free & unlimited for public
# repos). This does NOT build or deploy — the Pi build/deploy stays in Jenkins
# (or the optional deploy.yml). Lint the frontend, compile the backend.
# Triggers are split to avoid duplicate runs: a PR fires only `pull_request`,
# not also `push`. `push` runs only on `main` for post-merge validation.
on:
  push:
    branches: [main]                 # post-merge check on the release branch
  pull_request:
    branches: [development, main]     # validate every PR (into development or main)
  workflow_dispatch: {}              # manual run from the Actions tab

jobs:
  frontend:
    name: Frontend · ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db-world-frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      # package-lock.json is gitignored, so `npm install` resolves fresh (no `npm ci`).
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint

  backend:
    name: Backend · compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db-world-backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'   # backend targets JDK 25
          cache: maven
      - name: Compile
        run: mvn -B -ntp compile
