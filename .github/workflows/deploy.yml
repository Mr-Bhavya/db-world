name: Deploy to Pi (self-hosted)

# Deploys to the Pi from prebuilt GitHub artifacts (nothing is built on the Pi).
# Runs on a SELF-HOSTED runner installed on the Pi, so no inbound SSH/firewall
# holes are needed — the job executes locally on the box (like Jenkins).
#   • backend  ← the WAR from the rolling `backend-latest` prerelease (backend.yml)
#   • frontend ← the dist zip from an app Release (release.yml); blank tag = latest
#
# Prerequisites (one-time):
#   1. Register the Pi as a self-hosted runner (Settings → Actions → Runners).
#      Default labels (self-hosted) are fine. Run it as a SERVICE:
#        sudo ./svc.sh install && sudo ./svc.sh start
#   2. Create a `production` Environment (Settings → Environments), optionally
#      with a required reviewer so each deploy waits for your approval.
#   3. The runner user can `sudo /usr/local/bin/dbworldctl` (NOPASSWD sudoers)
#      and write to /var/www/dbworld; `curl` + `unzip` installed.
#
# This OVERLAPS the Jenkins deploy — use one path, not both.
on:
  workflow_dispatch:
    inputs:
      part:
        description: What to deploy
        type: choice
        options: [full, frontend, backend]
        default: full
      appTag:
        description: App release tag for the frontend (e.g. v3.0.1; blank = latest)
        required: false

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted   # the Pi runner (default labels: self-hosted, Linux, ARM64)
    environment: production
    env:
      PART: ${{ inputs.part }}
      APP_TAG: ${{ inputs.appTag }}
      REPO: ${{ github.repository }}
    steps:
      - name: Deploy backend (from backend-latest)
        if: ${{ env.PART != 'frontend' }}
        run: |
          set -euxo pipefail
          WORK="$RUNNER_TEMP/dbworld-deploy"
          rm -rf "$WORK" && mkdir -p "$WORK" && cd "$WORK"
          curl -fL -o db-world.war "https://github.com/$REPO/releases/download/backend-latest/db-world.war"
          sudo /usr/local/bin/dbworldctl update "$WORK/db-world.war"

      - name: Deploy frontend (from app release)
        if: ${{ env.PART != 'backend' }}
        run: |
          set -euxo pipefail
          WORK="$RUNNER_TEMP/dbworld-deploy"
          mkdir -p "$WORK" && cd "$WORK"
          TAG="$APP_TAG"
          if [ -z "$TAG" ]; then
            TAG=$(curl -fsSL "https://api.github.com/repos/$REPO/releases/latest" \
                  | grep -m1 '"tag_name"' | sed 's/.*: *"\(.*\)".*/\1/')
          fi
          TAG="v${TAG#v}"   # normalize: accept "3.0.1" or "v3.0.1"
          curl -fL -o dist.zip "https://github.com/$REPO/releases/download/$TAG/db-world-frontend-dist.zip"
          unzip -oq dist.zip -d "$WORK"
          REL="/var/www/dbworld/releases/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$REL"
          cp -r "$WORK/dist/." "$REL/"
          ln -sfn "$REL" /var/www/dbworld/current
          # keep only the last 5 releases
          ls -dt /var/www/dbworld/releases/* | tail -n +6 | xargs rm -rf || true
          echo "Deployed frontend ($TAG) -> $REL"
